<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 100" width="62" height="100">
  <defs>
    <linearGradient id="bb-silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f4f8"/>
      <stop offset="0.45" stop-color="#cbcbd6"/>
      <stop offset="1" stop-color="#8c8c9a"/>
    </linearGradient>
    <linearGradient id="bb-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62b6ff"/>
      <stop offset="0.5" stop-color="#1f7be0"/>
      <stop offset="1" stop-color="#0b4699"/>
    </linearGradient>
    <linearGradient id="bb-bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset="1" stop-color="#ffb000"/>
    </linearGradient>
    <clipPath id="bb-clip"><rect x="8.5" y="9.5" width="45" height="87" rx="9.5"/></clipPath>
  </defs>

  <!-- terminal nub -->
  <rect x="22" y="0.6" width="18" height="8" rx="2.6" fill="url(#bb-silver)" stroke="#13111d" stroke-width="1.3"/>
  <!-- dark shell / outline -->
  <rect x="6" y="7" width="50" height="92" rx="12" fill="#13111d"/>

  <g clip-path="url(#bb-clip)">
    <!-- coloured body -->
    <rect x="8.5" y="9.5" width="45" height="87" fill="url(#bb-body)"/>
    <!-- metallic bands (top + bottom) -->
    <rect x="8.5" y="9.5" width="45" height="16" fill="url(#bb-silver)"/>
    <rect x="8.5" y="24" width="45" height="2.5" fill="#5a5a66" opacity="0.6"/>
    <rect x="8.5" y="80" width="45" height="17" fill="url(#bb-silver)"/>
    <rect x="8.5" y="79" width="45" height="2.5" fill="#5a5a66" opacity="0.6"/>
    <!-- gloss highlight -->
    <rect x="12" y="28" width="7" height="48" rx="3.5" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- lightning bolt -->
  <path d="M35 29 L21.5 55.5 L30 55.5 L27 73 L42.5 45.5 L32.5 45.5 Z"
        fill="url(#bb-bolt)" stroke="#7a4d00" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
